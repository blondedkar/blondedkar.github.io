<!DOCTYPE html>
<html lang="en" class="scroll-auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="text/javascript">
      // Restore client-side routes after GitHub Pages serves 404.html.
      (function (l) {
        if (l.search[1] !== "/") {
          return;
        }

        const decoded = l.search
          .slice(1)
          .split("&")
          .map(function (segment) {
            return segment.replace(/~and~/g, "&");
          })
          .join("?");

        window.history.replaceState(
          null,
          "",
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      })(window.location);
    </script>
    <title>blonde Interactive</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,100..900&display=swap" rel="stylesheet">
  </head>


  <body class="bg-[#a0a0a0] text-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
