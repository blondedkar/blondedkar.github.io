<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>blonde Interactive</title>
    <script type="text/javascript">
      // Redirect unknown routes back into the SPA entry point.
      const pathSegmentsToKeep = 0;
      const { location } = window;

      location.replace(
        location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          location.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          location.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
          location.hash
      );
    </script>
  </head>
  <body></body>
</html>
